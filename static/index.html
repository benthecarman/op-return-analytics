<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OP_RETURN Analytics</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <h1>OP_RETURN Analytics</h1>

  <div class="summary" id="summary"></div>

  <div class="chart-container">
    <div class="chart-box">
      <div class="chart-toolbar">
        <button id="toggleMode" class="chart-btn">Cumulative</button>
        <button id="resetZoom" class="chart-btn">Reset Zoom</button>
      </div>
      <canvas id="mainChart"></canvas>
    </div>
    <p class="chart-hint">Drag to zoom. Double-click to reset.</p>
  </div>

  <div class="table-section">
    <h2>Orders</h2>
    <div class="table-controls">
      <button id="prevPage" disabled>&laquo; Prev</button>
      <span id="pageInfo"></span>
      <button id="nextPage" disabled>Next &raquo;</button>
    </div>
    <table id="ordersTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Date</th>
          <th>TxID</th>
          <th>Profit (sats)</th>
          <th>Profit (USD)</th>
          <th>Chain Fee (sats)</th>
          <th>vSize</th>
          <th>Fee Rate</th>
          <th>Private</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="/static/app.js?v=16"></script>
</body>
</html>
