<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OP_RETURN Analytics</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <h1>OP_RETURN Analytics</h1>

  <div class="controls">
    <label>Granularity
      <select id="granularity">
        <option value="day">Day</option>
        <option value="week">Week</option>
        <option value="month">Month</option>
      </select>
    </label>
    <label>Mode
      <select id="chartMode">
        <option value="periodic">Per Period</option>
        <option value="cumulative">Cumulative</option>
      </select>
    </label>
    <button id="resetZoom">Reset Zoom</button>
  </div>

  <div class="summary" id="summary"></div>

  <div class="chart-container">
    <div class="chart-box full">
      <canvas id="mainChart"></canvas>
    </div>
    <p class="chart-hint">Drag on the chart to zoom into a time period. Scroll to zoom. Double-click to reset.</p>
  </div>

  <div class="table-section">
    <h2>Orders</h2>
    <div class="table-controls">
      <button id="prevPage" disabled>&laquo; Prev</button>
      <span id="pageInfo"></span>
      <button id="nextPage" disabled>Next &raquo;</button>
    </div>
    <table id="ordersTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Date</th>
          <th>TxID</th>
          <th>Profit (sats)</th>
          <th>Chain Fee (sats)</th>
          <th>vSize</th>
          <th>Fee Rate</th>
          <th>Private</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="/static/app.js?v=3"></script>
</body>
</html>
